<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Microsoft JhengHei",sans-serif;
background:#f8f5ef;
color:#333;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),
rgba(0,0,0,.55)),
url('米福桌面.jpg');
background-size:cover;
background-position:center;

justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:70px;
margin-bottom:20px;

.hero p{
font-size:28px;

}

.btns{
display:flex;
gap:15px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:15px 30px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
color:white;

}

.line{
background:#06C755;
}

.panda{
background:#ff2b85;
}

.map{
background:#d4af37;

}

.section{

margin:auto;
padding:80px 20px;
}

.title{
text-align:center;
font-size:40px;
margin-bottom:50px;
}

.delivery{
background:white;
border-radius:20px;
padding:40px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.delivery ul{
line-height:2.2;
font-size:22px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:30px;
}

.menu img{
width:100%;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

footer{
background:#111;
color:white;
text-align:center;
padding:50px 20px;
}

.float{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.float a{
padding:15px 25px;
border-radius:50px;
text-decoration:none;
color:white;
font-weight:bold;
text-align:center;
}

.float-line{
background:#06C755;
}

.float-panda{
