<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>米福壽司專門店｜草屯壽司推薦</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Microsoft JhengHei",sans-serif;
background:#111;
color:#fff;
line-height:1.8;
}

.hero{
height:100vh;
background:url('米福桌面.jpg');
background-size:cover;
background-position:center;
position:relative;
display:flex;
align-items:center;
justify-content:center;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
}

.hero-content{
position:relative;
text-align:center;
z-index:2;
}

.hero h1{
font-size:4rem;
margin-bottom:15px;
}

.hero p{
font-size:1.3rem;
margin-bottom:30px;
color:#ddd;
}

.btn{
display:inline-block;
padding:14px 28px;
margin:10px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.line{
background:#06C755;
color:#fff;
}

.food{
background:#ff2b85;
color:#fff;
}

.map{
background:#d4af37;
color:#111;
}

.section{
padding:80px 10%;
}

.title{
text-align:center;
font-size:2rem;
margin-bottom:40px;
color:#d4af37;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e1e1e;
padding:25px;
border-radius:15px;
text-align:center;
}

.card h3{
margin-bottom:10px;
color:#d4af37;
}

.delivery{
max-width:700px;
margin:auto;
}

.delivery table{
width:100%;
border-collapse:collapse;
}

.delivery th,
.delivery td{
padding:15px;
border:1px solid #333;
text-align:center;
}

.delivery th{
background:#d4af37;
color:#111;
}

.contact{
text-align:center;
}

.contact p{
margin:10px 0;
}

.float-btn{
position:fixed;
right:20px;
z-index:999;
padding:15px 20px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
color:#fff;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.line-float{
background:#06C755;
bottom:90px;
}

.food-float{
background:#ff2b85;
bottom:20px;
}

footer{
text-align:center;
padding:30px;
background:#000;
color:#aaa;
}

@media(max-width:768px){

.hero h1{
font-size:2.2rem;
}

.hero p{
font-size:1rem;
}

.btn{
display:block;
margin:10px auto;
width:220px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="hero-content">

<h1>米福壽司專門店</h1>

<p>每一口都是幸福</p>

<a class="btn line"
href="https://lin.ee/JXSBwrM"
target="_blank">
LINE立即點餐
</a>

<a class="btn food"
href="https://foodpanda.go.link/5HXWc"
target="_blank">
Foodpanda外送
</a>

<a class="btn map"
href="https://maps.google.com/?q=南投縣草屯鎮虎山路832號"
target="_blank">
Google導航
</a>

</div>

</section>

<section class="section">

<h2 class="title">人氣推薦</h2>

<div class="cards">

<div class="card">
<h3>炙燒鮭魚肚</h3>
人氣必點
</div>

<div class="card">
<h3>生鮭魚</h3>
新鮮現切
</div>

<div class="card">
<h3>明太子蝦</h3>
炙燒香氣十足
</div>

</div>

</section>

<section class="section">

<h2 class="title">外送服務</h2>

<div class="delivery">

<table>

<tr>
<th>距離</th>
<th>最低消費</th>
</tr>

<tr><td>0-1公里</td><td>200元</td></tr>
<tr><td>2-3公里</td><td>300元</td></tr>
<tr><td>3-4公里</td><td>450元</td></tr>
<tr><td>4-5公里</td><td>600元</td></tr>
<tr><td>5-6公里</td><td>750元</td></tr>
<tr><td>6-7公里</td><td>900元</td></tr>

</table>

</div>

</section>

<section class="section contact">

<h2 class="title">聯絡我們</h2>

<p>📍 南投縣草屯鎮虎山路832號</p>

<p>📞 0909-605-985</p>

<p>🕚 11:00 - 20:00</p>

</section>

<a class="float-btn line-float"
href="https://lin.ee/JXSBwrM">
LINE點餐
</a>

<a class="float-btn food-float"
href="https://foodpanda.go.link/5HXWc">
Foodpanda
</a>

<footer>

© 2026 米福壽司專門店

</footer>

</body>
</html>
